<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antigravity Status Monitor</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');

    :root {
      --bg-color: #1a1b26;
      --panel-bg: #24283b;
      --border-color: #383e5a;
      --text-color: #a9b1d6;
      --text-muted: #565f89;
      --font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

      /* Active Light Colors */
      --red-color: hsl(355, 95%, 60%);
      --red-glow: hsla(355, 95%, 60%, 0.85);
      --yellow-color: hsl(45, 100%, 55%);
      --yellow-glow: hsla(45, 100%, 55%, 0.85);
      --green-color: hsl(145, 85%, 50%);
      --green-glow: hsla(145, 85%, 50%, 0.85);

      /* Inactive Light Colors (dimmed) */
      --red-dim: hsl(355, 30%, 15%);
      --yellow-dim: hsl(45, 30%, 15%);
      --green-dim: hsl(145, 30%, 12%);
    }

    body.vscode-light {
      --bg-color: #f2f3f7;
      --panel-bg: #ffffff;
      --border-color: #d5d8e6;
      --text-color: #3f445b;
      --text-muted: #8c92ac;
      --red-dim: hsl(355, 30%, 25%);
      --yellow-dim: hsl(45, 30%, 25%);
      --green-dim: hsl(145, 30%, 22%);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: var(--font-family);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100vw;
      overflow-x: hidden;
      padding: 20px;
      transition: background-color 0.3s ease;
    }

    /* Outer layout */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-grow: 1;
      width: 100%;
      max-width: 600px;
    }

    /* Traffic Light Housing */
    .traffic-light-housing {
      background: linear-gradient(145deg, #13141c, #1f2335);
      border: 4px solid #10121a;
      border-radius: 40px;
      padding: 6% 5%;
      box-shadow:
        0 20px 50px rgba(0, 0, 0, 0.5),
        inset 0 4px 10px rgba(255, 255, 255, 0.05),
        inset 0 -4px 10px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
      width: 90%;
      max-width: 240px;
      aspect-ratio: 1 / 2.3;
      justify-content: space-evenly;
      transition: all 0.3s ease;
      position: relative;
    }

    body.vscode-light .traffic-light-housing {
      background: linear-gradient(145deg, #2e303d, #494d63);
      border-color: #1e2029;
      box-shadow:
        0 20px 40px rgba(0, 0, 0, 0.2),
        inset 0 4px 10px rgba(255, 255, 255, 0.1);
    }

    /* Reflectors and Hoods */
    .lamp-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    /* Physical hood above the light */
    .lamp-hood {
      display: none;
    }

    /* Individual Lamp (Light) */
    .lamp {
      width: 60%;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      position: relative;
      z-index: 5;
      background-color: var(--dim-color);
      border: 6px solid #0f1015;
      box-shadow:
        inset 0 10px 20px rgba(0, 0, 0, 0.8),
        inset 0 -10px 20px rgba(255, 255, 255, 0.05),
        0 4px 6px rgba(0, 0, 0, 0.3);
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    body.vscode-light .lamp {
      border-color: #232530;
    }

    /* Active Lamp Classes */
    .lamp.red {
      --dim-color: var(--red-dim);
    }

    .lamp.red.active {
      background-color: var(--red-color);
      box-shadow:
        inset 0 4px 10px rgba(255, 255, 255, 0.4),
        0 0 40px var(--red-glow),
        0 0 80px var(--red-glow);
    }

    .lamp.yellow {
      --dim-color: var(--yellow-dim);
    }

    .lamp.yellow.active {
      background-color: var(--yellow-color);
      box-shadow:
        inset 0 4px 10px rgba(255, 255, 255, 0.4),
        0 0 40px var(--yellow-glow),
        0 0 80px var(--yellow-glow);
    }

    .lamp.yellow.flashing {
      animation: yellow-flash 0.8s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
    }

    .lamp.green {
      --dim-color: var(--green-dim);
    }

    .lamp.green.active {
      background-color: var(--green-color);
      box-shadow:
        inset 0 4px 10px rgba(255, 255, 255, 0.4),
        0 0 40px var(--green-glow),
        0 0 80px var(--green-glow);
    }

    /* Flashing animation for Yellow */
    @keyframes yellow-flash {
      0% {
        background-color: var(--yellow-dim);
        box-shadow:
          inset 0 10px 20px rgba(0, 0, 0, 0.8),
          0 0 0px transparent;
      }

      100% {
        background-color: var(--yellow-color);
        box-shadow:
          inset 0 4px 10px rgba(255, 255, 255, 0.4),
          0 0 40px var(--yellow-glow),
          0 0 80px var(--yellow-glow);
      }
    }

    /* Big status text */
    .status-text {
      margin-top: 15px;
      font-size: 1.15rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
      text-align: center;
    }

    .status-desc {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 2px;
      text-align: center;
      max-width: 320px;
      height: 36px;
      line-height: 1.4;
    }

    /* Dashboard & Diagnostics Footer */
    .footer {
      margin-top: 20px;
      background-color: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 10px 16px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      font-size: 0.78rem;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .footer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-label {
      color: var(--text-muted);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .footer-value {
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-color);
      background-color: rgba(0, 0, 0, 0.15);
      padding: 2px 8px;
      border-radius: 4px;
      max-width: 250px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Settings and Toggles */
    .controls {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 450px;
      margin-top: 15px;
      justify-content: center;
    }

    .btn {
      background-color: var(--panel-bg);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--font-family);
      font-size: 0.78rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s ease;
    }

    .btn:hover {
      background-color: var(--border-color);
      transform: translateY(-2px);
    }

    .btn.active {
      background-color: var(--text-muted);
      color: var(--bg-color);
    }

    .status-badge {
      background-color: var(--panel-bg);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 8px 16px;
      border-radius: 8px;
      font-family: var(--font-family);
      font-size: 0.78rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: default;
    }

    /* Dev tools manual override */
    .dev-bar {
      margin-top: 15px;
      width: 100%;
      max-width: 450px;
      border: 1px dashed var(--text-muted);
      border-radius: 12px;
      padding: 10px;
      background-color: rgba(0, 0, 0, 0.05);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .dev-bar-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      font-weight: 800;
      text-align: center;
    }

    .dev-buttons {
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .dev-btn {
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-family: var(--font-family);
      font-size: 0.75rem;
      font-weight: 800;
      color: #fff;
      transition: all 0.2s;
    }

    .dev-btn-red {
      background-color: var(--red-color);
    }

    .dev-btn-red:hover {
      box-shadow: 0 0 10px var(--red-glow);
    }

    .dev-btn-yellow {
      background-color: var(--yellow-color);
      color: #000;
    }

    .dev-btn-yellow:hover {
      box-shadow: 0 0 10px var(--yellow-glow);
    }

    .dev-btn-green {
      background-color: var(--green-color);
      color: #000000;
    }

    .dev-btn-green:hover {
      box-shadow: 0 0 10px var(--green-glow);
    }

    .pulse-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--green-color);
      box-shadow: 0 0 6px var(--green-color);
    }

    .pulse-indicator.active {
      animation: heartbeat 1s infinite;
    }

    @keyframes heartbeat {
      0% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.3);
        opacity: 0.5;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- Traffic Light Unit -->
    <div class="traffic-light-housing" id="lightHousing">
      <!-- RED LIGHT -->
      <div class="lamp-container">
        <div class="lamp-hood"></div>
        <div class="lamp red" id="lampRed" onclick="handleLampClick('busy')"></div>
      </div>
      <!-- YELLOW LIGHT -->
      <div class="lamp-container">
        <div class="lamp-hood"></div>
        <div class="lamp yellow" id="lampYellow" onclick="handleLampClick('waiting')"></div>
      </div>
      <!-- GREEN LIGHT -->
      <div class="lamp-container">
        <div class="lamp-hood"></div>
        <div class="lamp green active" id="lampGreen" onclick="handleLampClick('idle')"></div>
      </div>
    </div>

    <!-- State text description -->
    <div class="status-text" id="statusLabel" style="color: var(--green-color);">Idle</div>
    <div class="status-desc" id="statusDescription">Agent is idle. Ready to receive user requests.</div>

    <!-- Toolbar controls -->
    <div class="controls" style="margin-top: 5px;">
      <button class="btn active" id="soundToggleBtn" onclick="toggleSound()">
        <span>🔊</span> Sound On
      </button>
    </div>

    <!-- Diagnostics panel -->
    <div class="footer">
      <div class="footer-row">
        <span class="footer-label">Active Conv:</span>
        <span class="footer-value" id="convId" title="Searching...">None Detected</span>
      </div>
      <div class="footer-row">
        <span class="footer-label">Watch File:</span>
        <span class="footer-value" id="watchFile" title="No file watched">No file watched</span>
      </div>
      <div class="footer-row">
        <span class="footer-label">Connection Status:</span>
        <span class="footer-value" id="cdpStatus">Disconnect</span>
      </div>
      <div class="footer-row">
        <span class="footer-label">Monitor Mode:</span>
        <span class="footer-value" id="modeText">Log Mode</span>
      </div>
      <div class="footer-row">
        <span class="footer-label">Last Sync:</span>
        <span class="footer-value" id="lastSync">-</span>
      </div>
    </div>

    <!-- Dev simulation overrides -->
    <div class="dev-bar">
      <div class="dev-bar-title">Simulation Controls</div>
      <div class="dev-buttons">
        <button class="dev-btn dev-btn-red" onclick="updateStatus('busy', 'Agent is busy.')">RED</button>
        <button class="dev-btn dev-btn-yellow" onclick="runYellowSimulation()">YELLOW</button>
        <button class="dev-btn dev-btn-green" onclick="updateStatus('idle', 'Agent is idle.')">GREEN</button>
      </div>
    </div>
  </div>

  <script>
    let currentStatus = 'idle';
    let soundEnabled = true;
    let audioCtx = null;
    let yellowSimTimeout = null;
    let isSimulationActive = false;
    let lastExtensionState = null;

    function runYellowSimulation() {
      isSimulationActive = true;
      const prevStatus = currentStatus;
      const prevDesc = document.getElementById('statusDescription').innerText;

      updateStatus('waiting', 'Waiting for user confirmation.');

      if (yellowSimTimeout) clearTimeout(yellowSimTimeout);
      yellowSimTimeout = setTimeout(() => {
        isSimulationActive = false;
        if (lastExtensionState) {
          updateStatus(lastExtensionState.status, lastExtensionState.description);
        } else {
          updateStatus(prevStatus, prevDesc);
        }
      }, 3000);
    }

    // VS Code API
    const vscode = typeof acquireVsCodeApi !== 'undefined' ? acquireVsCodeApi() : null;

    // Handle messages sent from the extension extension.js
    window.addEventListener('message', event => {
      const message = event.data;
      switch (message.command) {
        case 'updateState':
          lastExtensionState = { status: message.status, description: message.description };
          if (!isSimulationActive) {
            updateStatus(message.status, message.description);
          }
          updateDiagnostics(message.diagnostics);
          break;
      }
    });

    // Sound setup
    function toggleSound() {
      soundEnabled = !soundEnabled;
      const btn = document.getElementById('soundToggleBtn');
      if (soundEnabled) {
        btn.innerHTML = '🔊 Sound On';
        btn.classList.add('active');
        playBeep(440, 0.1); // simple test beep
      } else {
        btn.innerHTML = '🔇 Sound Off';
        btn.classList.remove('active');
      }
    }

    function playBeep(frequency, duration) {
      if (!soundEnabled) return;
      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.type = 'sine';
        oscillator.frequency.value = frequency;

        gainNode.gain.setValueAtTime(0.60, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.start();
        oscillator.stop(audioCtx.currentTime + duration);
      } catch (e) {
        console.error("Audio error:", e);
      }
    }

    function playTrumpetChime() {
      if (!soundEnabled) return;
      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
        
        const now = audioCtx.currentTime;
        const notes = [
          { freq: 523.25, start: 0.0, dur: 0.4 },
          { freq: 659.25, start: 0.3, dur: 0.4 },
          { freq: 783.99, start: 0.6, dur: 0.4 },
          { freq: 1046.50, start: 0.9, dur: 1.1 }
        ];
        
        notes.forEach(note => {
          const osc = audioCtx.createOscillator();
          const gainNode = audioCtx.createGain();
          const filter = audioCtx.createBiquadFilter();
          
          osc.type = 'sawtooth';
          osc.frequency.value = note.freq;
          
          filter.type = 'lowpass';
          filter.frequency.setValueAtTime(1500, now + note.start);
          filter.frequency.exponentialRampToValueAtTime(400, now + note.start + note.dur);
          
          gainNode.gain.setValueAtTime(0.0, now + note.start);
          gainNode.gain.linearRampToValueAtTime(0.50, now + note.start + 0.01);
          gainNode.gain.exponentialRampToValueAtTime(0.01, now + note.start + note.dur);
          
          osc.connect(filter);
          filter.connect(gainNode);
          gainNode.connect(audioCtx.destination);
          
          osc.start(now + note.start);
          osc.stop(now + note.start + note.dur);
        });
      } catch (e) {
        console.error("Audio error:", e);
      }
    }

    function playAlertForState(state) {
      if (state === 'busy') {
        playBeep(330, 2.0); // low warning beep (lasts 2s)
      } else if (state === 'waiting') {
        // Pulse beep over 2 seconds (5 beeps, 0.2s duration every 0.4s)
        for (let i = 0; i < 5; i++) {
          setTimeout(() => playBeep(587.33, 0.2), i * 400);
        }
      } else if (state === 'idle') {
        playTrumpetChime(); // cheerful trumpet arpeggio (lasts 2s)
      }
    }

    // Toggle lights manually by clicking on them
    function handleLampClick(status) {
      // Notify extension of manual override or just set it locally
      updateStatus(status, `Manual Override: Set to ${status.toUpperCase()}`);
      if (vscode) {
        vscode.postMessage({
          command: 'manualOverride',
          status: status
        });
      }
    }

    // Update status UI
    function updateStatus(status, description = '') {
      if (currentStatus !== status) {
        playAlertForState(status);
        currentStatus = status;
      }

      const lampRed = document.getElementById('lampRed');
      const lampYellow = document.getElementById('lampYellow');
      const lampGreen = document.getElementById('lampGreen');
      const statusLabel = document.getElementById('statusLabel');
      const statusDesc = document.getElementById('statusDescription');

      // Clear all active classes
      lampRed.classList.remove('active');
      lampYellow.classList.remove('active', 'flashing');
      lampGreen.classList.remove('active');

      if (status === 'busy') {
        lampRed.classList.add('active');
        statusLabel.innerText = 'Busy';
        statusLabel.style.color = 'var(--red-color)';
        statusDesc.innerText = description || 'Agent is actively performing tasks (thinking, editing, running code).';
      } else if (status === 'waiting') {
        lampYellow.classList.add('active', 'flashing');
        statusLabel.innerText = 'Attention';
        statusLabel.style.color = 'var(--yellow-color)';
        statusDesc.innerText = description || 'Agent is waiting for your confirmation or input to proceed.';
      } else {
        // Idle
        lampGreen.classList.add('active');
        statusLabel.innerText = 'Idle';
        statusLabel.style.color = 'var(--green-color)';
        statusDesc.innerText = description || 'Agent is idle. Ready for your next command.';
      }

      document.getElementById('lastSync').innerText = new Date().toLocaleTimeString();
    }

    // Update Diagnostics
    function updateDiagnostics(diagnostics) {
      if (!diagnostics) return;

      if (diagnostics.convId) {
        const convEl = document.getElementById('convId');
        convEl.innerText = diagnostics.convId;
        convEl.title = diagnostics.convId;
      }
      if (diagnostics.watchFile) {
        const watchEl = document.getElementById('watchFile');
        watchEl.innerText = diagnostics.watchFile;
        watchEl.title = diagnostics.watchFile;
      }

      const cdpStatusEl = document.getElementById('cdpStatus');
      const modeTextEl = document.getElementById('modeText');

      if (diagnostics.cdpConnected) {
        cdpStatusEl.innerText = `Connected (Port ${diagnostics.cdpPort || 9000})`;
        cdpStatusEl.style.color = 'var(--green-color)';
        modeTextEl.innerText = 'CDP + Log Mode';
      } else {
        cdpStatusEl.innerText = `Disconnected (No Port ${diagnostics.cdpPort || 9000})`;
        cdpStatusEl.style.color = 'var(--text-muted)';
        modeTextEl.innerText = 'Log Mode';
      }
    }
  </script>
</body>

</html>
